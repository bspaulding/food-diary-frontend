fragment Macros on food_diary_nutrition_item {
  total_fat_grams
  added_sugars_grams
  protein_grams
  saturated_fat_grams
  trans_fat_grams
  polyunsaturated_fat_grams
  monounsaturated_fat_grams
  cholesterol_milligrams
  sodium_milligrams
  total_carbohydrate_grams
  dietary_fiber_grams
  total_sugars_grams
}

query GetEntries {
  food_diary_diary_entry(order_by: { day: desc, consumed_at: asc }) {
    id
    day
    consumed_at
    calories
    servings
    nutrition_item {
      id
      description
      calories
      ...Macros
    }
    recipe {
      id
      name
      calories
      recipe_items {
        id
        servings
        nutrition_item {
          id
          description
          calories
          ...Macros
        }
      }
    }
  }
}
