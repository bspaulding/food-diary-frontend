fragment Macros on food_diary_nutrition_item {
  total_fat_grams
  added_sugars_grams
  protein_grams
}

query GetEntries {
  food_diary_diary_entry(order_by: { day: desc, consumed_at: asc }) {
    id
    consumed_at
    calories
    servings
    nutrition_item {
      id
      description
      calories
      ...Macros
    }
    recipe {
      id
      name
      calories
      recipe_items {
        servings
        nutrition_item {
          ...Macros
        }
      }
    }
  }
}
