fragment nutritionItem on food_diary_nutrition_item {
  description
  calories
  total_fat_grams
  saturated_fat_grams
  trans_fat_grams
  polyunsaturated_fat_grams
  monounsaturated_fat_grams
  cholesterol_milligrams
  sodium_milligrams
  total_carbohydrate_grams
  dietary_fiber_grams
  total_sugars_grams
  added_sugars_grams
  protein_grams
}

query ExportEntries {
  food_diary_diary_entry {
    servings
    consumed_at
    nutrition_item {
      ...nutritionItem
    }
    recipe {
      name
      recipe_items {
        servings
        nutrition_item {
          ...nutritionItem
        }
      }
    }
  }
}
